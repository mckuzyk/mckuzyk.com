baseURL: "https://mckuzyk.com/"
languageCode: en-us
title: "McKuzyk"
theme: PaperMod

params:
  homeInfoParams:
    Title: "Hi, I'm Mark"
    Content: "Physicist turned data scientist. I spent a decade studying light before realizing data pays better. I write about ML, math, and whatever else I'm trying to figure out — half to share ideas, half to make sure I actually understand them."
  socialIcons:
    - name: github
      url: "https://github.com/mckuzyk"
    - name: linkedin
      url: "https://www.linkedin.com/in/mark-kuzyk-113198aa/"
  math: true

menu:
  main:
    - name: About
      url: /about/
      weight: 10
    - name: Resume
      url: /resume/
      weight: 20
    - name: CV
      url: /cv/
      weight: 25
    - name: Blog
      url: /posts/
      weight: 30

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - '$$'
              - '$$'
          inline:
            - - '$'
              - '$'
        enable: true
    renderer:
      unsafe: true
